<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">💊 Pharmacy Shop</h1>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#products">Products</a></li>
                <li><a href="#cart">Cart</a></li>
                <li><a href="#" onclick="toggleAuth()">Login/Register</a></li>
            </ul>
        </div>
    </nav>

    <!-- Auth Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAuth()">&times;</span>
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>
            <div id="loginForm" class="tab-content active">
                <h2>Login</h2>
                <input type="email" placeholder="Email" id="loginEmail">
                <input type="password" placeholder="Password" id="loginPassword">
                <button onclick="login()">Login</button>
            </div>
            <div id="registerForm" class="tab-content">
                <h2>Register</h2>
                <input type="text" placeholder="Name" id="regName">
                <input type="email" placeholder="Email" id="regEmail">
                <input type="password" placeholder="Password" id="regPassword">
                <input type="tel" placeholder="Phone" id="regPhone">
                <input type="text" placeholder="Address" id="regAddress">
                <button onclick="register()">Register</button>
            </div>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h2>Welcome to Your Online Pharmacy</h2>
            <p>Quality medicines delivered to your doorstep</p>
            <button onclick="scrollToProducts()">Shop Now</button>
        </div>
    </section>

    <!-- Products Section -->
    <section id="products" class="products">
        <div class="container">
            <h2>Our Products</h2>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search medicines..." onkeyup="searchProducts()">
            </div>
            <div id="productsList" class="products-grid">
                <!-- Products will be loaded here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Cart Section -->
    <section id="cart" class="cart">
        <div class="container">
            <h2>Shopping Cart</h2>
            <div id="cartItems" class="cart-items">
                <!-- Cart items will be displayed here -->
            </div>
            <div class="cart-summary">
                <h3>Total: ₹<span id="totalPrice">0</span></h3>
                <button onclick="checkout()">Checkout</button>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Pharmacy Shop. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
